<!DOCTYPE html>
<html>
<head><title>Gerar ícones</title></head>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<br>
<a id="dl192" download="icon-192.png">Baixar icon-192.png</a><br>
<a id="dl512" download="icon-512.png">Baixar icon-512.png</a>

<script>
function drawIcon(canvas) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;
  // Fundo verde
  ctx.fillStyle = '#6AAF1A';
  ctx.beginPath();
  ctx.roundRect(0, 0, s, s, s * 0.22);
  ctx.fill();
  // Ponto branco
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(s * 0.3, s * 0.42, s * 0.07, 0, Math.PI * 2);
  ctx.fill();
  // Texto SC
  ctx.fillStyle = '#fff';
  ctx.font = `bold ${s * 0.28}px -apple-system, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('SC', s * 0.58, s * 0.42);
  // Subtexto
  ctx.font = `${s * 0.1}px -apple-system, sans-serif`;
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  ctx.fillText('Conecta', s * 0.5, s * 0.68);
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192);
drawIcon(c512);

document.getElementById('dl192').href = c192.toDataURL('image/png');
document.getElementById('dl512').href = c512.toDataURL('image/png');
</script>
</body>
</html>
